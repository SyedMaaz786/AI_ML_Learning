<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Summarizer</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap");

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Space Grotesk", sans-serif;
        margin: 0;
        padding: 0;
        background-color: #0a0a0f;
        color: #e2e2f0;
        min-height: 100vh;
      }

      .container {
        max-width: 600px;
        margin: 50px auto;
        padding: 2rem;
        background: #13131a;
        border-radius: 16px;
        border: 1px solid #2a2a3d;
        position: relative;
        overflow: hidden;
      }

      /* Ambient glow blobs — pure CSS, no JS */
      .container::before {
        content: "";
        position: absolute;
        top: -80px;
        left: -80px;
        width: 260px;
        height: 260px;
        background: radial-gradient(
          circle,
          rgba(139, 92, 246, 0.15) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      .container::after {
        content: "";
        position: absolute;
        bottom: -80px;
        right: -80px;
        width: 220px;
        height: 220px;
        background: radial-gradient(
          circle,
          rgba(59, 130, 246, 0.12) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      h1 {
        text-align: center;
        font-size: 26px;
        font-weight: 700;
        background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.5px;
        margin-bottom: 4px;
      }

      h3 {
        text-align: center;
        color: #6b7280;
        font-size: 13px;
        font-weight: 400;
        margin-top: 0;
        margin-bottom: 1.5rem;
        letter-spacing: 0.3px;
      }

      p {
        color: #9ca3af;
        font-size: 13px;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      textarea {
        height: 150px;
        padding: 12px;
        background: #0d0d14;
        border: 1px solid #2a2a3d;
        border-radius: 10px;
        color: #e2e2f0;
        font-family: "Space Grotesk", sans-serif;
        font-size: 14px;
        resize: vertical;
        outline: none;
        transition: border-color 0.2s;
      }

      textarea:focus {
        border-color: #7c3aed;
      }

      textarea::placeholder {
        color: #4b5563;
      }

      button {
        background: linear-gradient(135deg, #7c3aed, #3b82f6);
        color: white;
        border: none;
        padding: 12px 15px;
        font-size: 15px;
        font-weight: 600;
        font-family: "Space Grotesk", sans-serif;
        cursor: pointer;
        border-radius: 10px;
        letter-spacing: 0.3px;
        transition:
          opacity 0.2s,
          transform 0.1s;
      }

      button:hover {
        opacity: 0.85;
        transform: scale(0.99);
      }

      button:active {
        transform: scale(0.97);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #summary-output {
        margin-top: 16px;
        background: #0d0d14;
        padding: 14px;
        border-radius: 10px;
        border: 1px solid #2a2a3d;
      }

      #summary-heading {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1px;
        color: #7c3aed;
        text-transform: uppercase;
        margin-top: 0;
        margin-bottom: 8px;
      }

      #summary-text {
        color: #c4c4d4;
        font-size: 14px;
        line-height: 1.6;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Text Summarizer</h1>
      <h3>using HuggingFace Transformer</h3>
      <p>Write or Paste your content below for quick summarization.</p>

      <form id="summarization-form">
        <textarea
          id="dialogue-input"
          placeholder="Enter your content here..."
          required
        ></textarea>
        <button type="submit">Summarize</button>
      </form>

      <div id="summary-output">
        <h3 id="summary-heading">Content Summary</h3>
        <p id="summary-text"></p>
      </div>
    </div>

    <script>
      document
        .getElementById("summarization-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const dialogueInput = document.getElementById("dialogue-input");
          const summaryText = document.getElementById("summary-text");
          const submitButton = e.target.querySelector("button");

          const dialogue = dialogueInput.value.trim();
          if (!dialogue) return;

          summaryText.innerText = "Processing...";
          submitButton.disabled = true;

          try {
            const response = await fetch("/summarize/", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ dialogue }),
            });

            if (!response.ok) {
              throw new Error(`Server error: ${response.status}`);
            }

            const data = await response.json();
            summaryText.innerText = data.summary || "No summary returned.";
          } catch (err) {
            summaryText.innerText = `Error: ${err.message}`;
          } finally {
            submitButton.disabled = false;
          }
        });
    </script>
  </body>
</html>
